<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-blue-600">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">Subir Imagen</h1>
        
        <!-- El formulario apunta a nuestra API en Node.js -->
        <form action="/api/upload" method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Seleccionar Archivo (.pdf)</label>
                <input type="file" name="imagen" accept=".pdf" required 
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Asignar Número (1-34)</label>
                <input type="number" name="numero" min="1" max="34" required placeholder="Ej: 5"
                       class="block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <button type="submit" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Subir a /image/
            </button>
        </form>
        
        <!-- NUEVA SECCIÓN PARA EL FONDO EN BASE64 -->
        <hr class="my-8 border-gray-200">
        <h2 class="text-xl font-bold mb-4 text-gray-800 text-center">Cambiar Fondo de la Web</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Seleccionar Imagen de tu Galería</label>
                <input type="file" id="bgInput" accept="image/*"
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>
            <button onclick="subirFondo()" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors">
                Actualizar Fondo (Base64)
            </button>
            <p id="bgStatus" class="text-sm text-center font-semibold hidden"></p>
        </div>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-blue-600 transition">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // Función para convertir la imagen a Base64 y enviarla al servidor
        function subirFondo() {
            const fileInput = document.getElementById('bgInput');
            const status = document.getElementById('bgStatus');
            
            if (!fileInput.files.length) {
                status.textContent = "Por favor selecciona una imagen primero.";
                status.className = "text-sm text-center font-semibold text-red-600 block mt-2";
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            // Mostrar mensaje de carga
            status.textContent = "Comprimiendo imagen y subiendo a la nube...";
            status.className = "text-sm text-center font-semibold text-yellow-600 block mt-2";

            reader.onload = function(e) {
                // Crear una imagen en memoria para poder redimensionarla
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    // Tamaño máximo permitido (Resolución Full HD)
                    const MAX_WIDTH = 1920;
                    const MAX_HEIGHT = 1080;

                    // Calcular nuevas dimensiones manteniendo la proporción
                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    // Dibujar la imagen redimensionada en el canvas
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Convertir a JPEG con calidad al 70% (reduce muchísimo el peso, evita el error 413)
                    const base64String = canvas.toDataURL('image/jpeg', 0.7);

                    fetch('/api/background', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ background: base64String })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            status.textContent = "¡Fondo actualizado con éxito!";
                            status.className = "text-sm text-center font-semibold text-green-600 block mt-2";
                        } else {
                            status.textContent = "Error al guardar el fondo.";
                            status.className = "text-sm text-center font-semibold text-red-600 block mt-2";
                        }
                    })
                    .catch(err => {
                        status.textContent = "Error al conectar con el servidor.";
                        status.className = "text-sm text-center font-semibold text-red-600 block mt-2";
                    });
                };
                
                // Cargar la imagen original en nuestra variable "img"
                img.src = e.target.result;
            };
            
            // Lee el archivo original
            reader.readAsDataURL(file);
        }
    </script>

    <!-- Firma -->
    <div class="fixed bottom-4 w-full text-center text-gray-500 text-sm font-medium tracking-wider pointer-events-none">
        Hecho por Erik
    </div>
</body>
</html>
